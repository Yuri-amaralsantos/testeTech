<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Notebook</title>
  <desc id="desc">Ilustração de um notebook aberto.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="48" fill="url(#bg)"/>
  <circle cx="1040" cy="130" r="120" fill="#ffffff" opacity="0.08"/>
  <circle cx="160" cy="650" r="180" fill="#ffffff" opacity="0.07"/>
  <rect x="250" y="160" width="700" height="460" rx="28" fill="#0f172a" opacity="0.35"/>
  <rect x="270" y="170" width="660" height="390" rx="20" fill="url(#screen)" stroke="#e2e8f0" stroke-width="10"/>
  <rect x="320" y="220" width="560" height="270" rx="18" fill="#ffffff" opacity="0.65"/>
  <rect x="290" y="570" width="620" height="110" rx="24" fill="url(#body)"/>
  <rect x="330" y="595" width="540" height="38" rx="19" fill="#94a3b8" opacity="0.35"/>
  <rect x="555" y="520" width="90" height="26" rx="13" fill="#64748b"/>
  <circle cx="600" cy="280" r="52" fill="#38bdf8" opacity="0.35"/>
  <circle cx="710" cy="340" r="42" fill="#f472b6" opacity="0.35"/>
  <circle cx="470" cy="355" r="36" fill="#f59e0b" opacity="0.32"/>
</svg>
