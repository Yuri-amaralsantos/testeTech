  <rect x="260" y="195" width="680" height="330" rx="18" fill="#0b1220"/>
  <rect x="300" y="235" width="600" height="36" rx="18" fill="url(#glow)" opacity="0.95"/>
  <rect x="300" y="295" width="430" height="24" rx="12" fill="#60a5fa" opacity="0.75"/>
  <rect x="300" y="340" width="520" height="24" rx="12" fill="#a78bfa" opacity="0.7"/>
  <rect x="300" y="385" width="360" height="24" rx="12" fill="#34d399" opacity="0.75"/>
  <rect x="540" y="560" width="120" height="34" rx="17" fill="#94a3b8"/>
  <rect x="490" y="590" width="220" height="54" rx="20" fill="#e2e8f0"/>
  <rect x="390" y="640" width="420" height="28" rx="14" fill="#cbd5e1"/>
